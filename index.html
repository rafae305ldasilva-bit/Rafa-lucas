<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rafa & Lucas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: #fff;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 30px;
      font-size: 2.5em;
    }

    .container {
      padding: 15px;
    }

    .text {
      max-width: 500px;
      margin: 20px auto;
      font-size: 1.1em;
      background: rgba(255,255,255,0.15);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    /* 💖 CONTADOR */
    #contador {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    #contador span {
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 15px;
      min-width: 70px;
      backdrop-filter: blur(5px);
      animation: pulse 2s infinite;
    }

    #contador b {
      display: block;
      font-size: 1.5em;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    /* 📸 STORIES */
    .stories {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 15px;
    }

    .stories img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 3px solid white;
      cursor: pointer;
    }

    /* 📸 GALERIA */
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 15px;
    }

    .gallery img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 18px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    .gallery img:hover {
      transform: scale(1.04);
    }

    /* 🔥 FOTO PRINCIPAL */
    .gallery img:first-child {
      grid-column: span 2;
      height: 230px;
    }

    /* 🔍 LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 15px;
    }

    /* 💖 CORAÇÕES */
    .heart {
      position: fixed;
      bottom: -20px;
      color: rgba(255,255,255,0.8);
      animation: subir 6s linear infinite;
    }

    @keyframes subir {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>Rafa & Lucas 💖</h1>

<div class="container">

  <div class="text">
    Um site para lembrar o meu amor e carinho por você.<br><br>
    Te conheci por uma live de tiktok e te mandava rosas kkk...<br><br>
    <b>TE AMO.</b>
  </div>

  <!-- 💖 CONTADOR -->
  <div id="contador">
    <span><b>0</b><small>dias</small></span>
    <span><b>0</b><small>horas</small></span>
    <span><b>0</b><small>min</small></span>
    <span><b>0</b><small>seg</small></span>
  </div>

  <p>💖 Tempo do nosso amor 💖</p>

  <!-- 📸 STORIES -->
  <div class="stories">
    <img src="foto1.jpg" onclick="abrir(this.src)">
    <img src="foto2.jpg" onclick="abrir(this.src)">
    <img src="foto3.jpg" onclick="abrir(this.src)">
    <img src="foto4.jpg" onclick="abrir(this.src)">
  </div>

  <!-- 📸 GALERIA -->
  <div class="gallery">
    <img src="foto1.jpg" onclick="abrir(this.src)">
    <img src="foto2.jpg" onclick="abrir(this.src)">
    <img src="foto3.jpg" onclick="abrir(this.src)">
    <img src="foto4.jpg" onclick="abrir(this.src)">
  </div>

</div>

<!-- 🔍 LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="fechar()">
  <img id="imgGrande">
</div>

<!-- 🎵 MÚSICA -->
<audio autoplay loop>
  <source src="musica.mp3" type="audio/mp3">
</audio>

<script>
  const dataInicio = new Date("2025-08-31T00:00:00");

  function atualizarContador() {
    const agora = new Date();
    const diff = agora - dataInicio;

    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diff / (1000 * 60)) % 60);
    const segundos = Math.floor((diff / 1000) % 60);

    const spans = document.querySelectorAll("#contador span b");

    spans[0].innerText = dias;
    spans[1].innerText = horas;
    spans[2].innerText = minutos;
    spans[3].innerText = segundos;
  }

  setInterval(atualizarContador, 1000);

  function abrir(src) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("imgGrande").src = src;
  }

  function fechar() {
    document.getElementById("lightbox").style.display = "none";
  }

  function criarCoracao() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 25) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }

  setInterval(criarCoracao, 300);
</script>

</body>
</html>
