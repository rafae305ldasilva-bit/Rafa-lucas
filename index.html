<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Rafa & Lucas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: #fff;
  overflow-x: hidden;
}

h1 { margin-top: 30px; }

.container { padding: 15px; }

.text {
  max-width: 500px;
  margin: 20px auto;
  background: rgba(255,255,255,0.15);
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

/* 📸 GALERIA */
.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 15px;
}

.gallery img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 18px;
}

.gallery img:first-child {
  grid-column: span 2;
  height: 230px;
}

/* 🔍 LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.lightbox img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 15px;
}

/* BOTÕES */
.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  background: rgba(255,255,255,0.2);
  border: none;
  padding: 10px;
  border-radius: 50%;
  color: white;
}

.prev { left: 15px; }
.next { right: 15px; }

/* 🎵 */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: white;
  color: #ff4d6d;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
}

/* 💖 */
.heart {
  position: fixed;
  bottom: -20px;
  animation: subir 6s linear infinite;
}

@keyframes subir {
  to { transform: translateY(-100vh); opacity:0; }
}
</style>
</head>

<body>

<h1>Rafa & Lucas 💖</h1>

<div class="container">

<div class="text">
Te amo muito 💖
</div>

<div class="gallery">
<img src="foto1.jpg" onclick="abrir(this)">
<img src="foto2.jpg" onclick="abrir(this)">
<img src="foto3.jpg" onclick="abrir(this)">
<img src="foto4.jpg" onclick="abrir(this)">
<img src="foto5.jpg" onclick="abrir(this)">
</div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<button class="nav-btn prev" onclick="mudar(-1)">‹</button>
<img id="imgGrande">
<button class="nav-btn next" onclick="mudar(1)">›</button>
</div>

<!-- AUDIO -->
<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<script>
let imagens = [];
let index = 0;
let autoplay;

function atualizarLista() {
  imagens = Array.from(document.querySelectorAll(".gallery img"));
}

function abrir(img) {
  atualizarLista();
  index = imagens.indexOf(img);
  document.getElementById("lightbox").style.display = "flex";
  mostrar();
  iniciarAuto();
}

function mostrar() {
  document.getElementById("imgGrande").src = imagens[index].src;
}

function mudar(dir) {
  index = (index + dir + imagens.length) % imagens.length;
  mostrar();
  reiniciarAuto();
}

/* 🎬 AUTOPLAY */
function iniciarAuto() {
  autoplay = setInterval(() => {
    mudar(1);
  }, 3000);
}

function reiniciarAuto() {
  clearInterval(autoplay);
  iniciarAuto();
}

/* 👉 SWIPE */
let startX = 0;

document.getElementById("lightbox").addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.getElementById("lightbox").addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if (startX - endX > 50) mudar(1);
  if (endX - startX > 50) mudar(-1);
});

/* FECHAR */
document.getElementById("lightbox").onclick = e => {
  if (e.target.id === "lightbox") {
    e.currentTarget.style.display = "none";
    clearInterval(autoplay);
  }
};

/* 🎵 */
function toggleMusic(){
  const m = document.getElementById("musica");
  m.paused ? m.play() : m.pause();
}

/* 💖 */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(15+Math.random()*25)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);
</script>

</body>
</html>
